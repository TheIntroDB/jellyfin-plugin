name: '🚀 Publish Plugin'

permissions:
  contents: write  # Required to upload assets to GitHub Releases

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin version (e.g. 1.0.0.0 or v1.0.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set version from release
        id: version
        run: |
          RAW="${{ github.event.release.tag_name || github.event.inputs.version }}"
          VERSION="${RAW#v}"
          # Ensure 4-part version (e.g. 1.0.0 -> 1.0.0.0)
          PARTS=$(echo "$VERSION" | tr '.' '\n' | wc -l)
          if [ "$PARTS" -eq 3 ]; then
            VERSION="${VERSION}.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Update plugin version in project files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update build.yaml
          sed -i "s/version: \".*\"/version: \"$VERSION\"/" build.yaml
          # Update TheIntroDB.csproj
          sed -i "s/<Version>.*<\/Version>/<Version>$VERSION<\/Version>/" TheIntroDB/TheIntroDB.csproj
          sed -i "s/<AssemblyVersion>.*<\/AssemblyVersion>/<AssemblyVersion>$VERSION<\/AssemblyVersion>/" TheIntroDB/TheIntroDB.csproj
          sed -i "s/<FileVersion>.*<\/FileVersion>/<FileVersion>$VERSION<\/FileVersion>/" TheIntroDB/TheIntroDB.csproj

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: "9.0.x"

      - name: Build Jellyfin Plugin
        uses: oddstr13/jellyfin-plugin-repository-manager@9497a0a499416cc572ed2e07a391d9f943a37b4d # v1.1.1
        id: jprm
        with:
          dotnet-target: "net9.0"
          version: ${{ steps.version.outputs.version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: build-artifact
          retention-days: 30
          if-no-files-found: error
          path: ${{ steps.jprm.outputs.artifact }}

  upload:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: build-artifact

      - name: Prepare GH Release Assets
        run: |
          for file in ./*; do
            md5sum "${file#./}" >> "${file%.*}.md5"
            sha256sum "${file#./}" >> "${file%.*}.sha256"
          done
          ls -l

      - name: Upload GH Release Assets
        uses: shogo82148/actions-upload-release-asset@8f6863c6c894ba46f9e676ef5cccec4752723c1e # v1.9.2
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./*
